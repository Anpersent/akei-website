backend:
  name: github
  repo: Anpersent/akei-website
  branch: main
  auth_type: implicit
  app_id: Ov23liLCn92AWpqZQFig

media_folder: "static/images"
public_folder: "/static/images"

collections:

  - name: "settings"
    label: "⚙️ Site Settings"
    files:

      - name: "general"
        label: "Contacts & SEO & Fonts"
        file: "_data/settings.json"
        fields:
          - label: "Phone"
            name: "phone"
            widget: "string"
            hint: "Example: +371 29 760 588"
          - label: "Email"
            name: "email"
            widget: "string"
            hint: "Example: info@akei.lv"
          - label: "Address"
            name: "address"
            widget: "string"
            hint: "Example: Riga, Latvia"
          - label: "Page Title (SEO)"
            name: "seo_title"
            widget: "string"
            hint: "Shown in browser tab and Google results."
          - label: "Meta Description (SEO)"
            name: "seo_description"
            widget: "text"
            hint: "Shown in Google search results. 150-160 characters recommended."
          - label: "Hero Heading"
            name: "hero_heading"
            widget: "string"
            hint: "Main heading on the homepage"
          - label: "Hero Subtext"
            name: "hero_subtext"
            widget: "text"
            hint: "Paragraph under the main heading"
          - label: "Main Text Font"
            name: "font_body"
            widget: "select"
            hint: "Font for all regular text on the site"
            options:
              - { label: "DM Sans (current)", value: "DM Sans" }
              - { label: "Inter", value: "Inter" }
              - { label: "Roboto", value: "Roboto" }
              - { label: "Open Sans", value: "Open Sans" }
              - { label: "Lato", value: "Lato" }
              - { label: "Montserrat", value: "Montserrat" }
              - { label: "Raleway", value: "Raleway" }
              - { label: "Nunito", value: "Nunito" }
              - { label: "Poppins", value: "Poppins" }
              - { label: "Source Sans 3", value: "Source Sans 3" }
              - { label: "PT Sans", value: "PT Sans" }
              - { label: "Noto Sans", value: "Noto Sans" }
              - { label: "Ubuntu", value: "Ubuntu" }
              - { label: "Mulish", value: "Mulish" }
              - { label: "Josefin Sans", value: "Josefin Sans" }
              - { label: "Barlow", value: "Barlow" }
              - { label: "Exo 2", value: "Exo 2" }
              - { label: "Cabin", value: "Cabin" }
              - { label: "Karla", value: "Karla" }
              - { label: "Figtree", value: "Figtree" }
              - { label: "Outfit", value: "Outfit" }
              - { label: "Plus Jakarta Sans", value: "Plus Jakarta Sans" }
              - { label: "Sora", value: "Sora" }
              - { label: "Jost", value: "Jost" }
              - { label: "Manrope", value: "Manrope" }
              - { label: "Work Sans", value: "Work Sans" }
              - { label: "Rubik", value: "Rubik" }
              - { label: "Quicksand", value: "Quicksand" }
              - { label: "Comfortaa", value: "Comfortaa" }
              - { label: "Merriweather (serif)", value: "Merriweather" }
              - { label: "Playfair Display (serif)", value: "Playfair Display" }
              - { label: "Lora (serif)", value: "Lora" }
              - { label: "PT Serif (serif)", value: "PT Serif" }
              - { label: "Libre Baskerville (serif)", value: "Libre Baskerville" }
              - { label: "Crimson Text (serif)", value: "Crimson Text" }
              - { label: "EB Garamond (serif)", value: "EB Garamond" }
              - { label: "Cormorant Garamond (serif)", value: "Cormorant Garamond" }
              - { label: "Space Grotesk", value: "Space Grotesk" }
              - { label: "IBM Plex Sans", value: "IBM Plex Sans" }
              - { label: "Fira Sans", value: "Fira Sans" }
          - label: "Heading Font"
            name: "font_heading"
            widget: "select"
            hint: "Font for big headings (currently Bebas Neue)"
            options:
              - { label: "Bebas Neue (current)", value: "Bebas Neue" }
              - { label: "Oswald", value: "Oswald" }
              - { label: "Anton", value: "Anton" }
              - { label: "Black Han Sans", value: "Black Han Sans" }
              - { label: "Righteous", value: "Righteous" }
              - { label: "Teko", value: "Teko" }
              - { label: "Squada One", value: "Squada One" }
              - { label: "Michroma", value: "Michroma" }
              - { label: "Rajdhani", value: "Rajdhani" }
              - { label: "Russo One", value: "Russo One" }
              - { label: "Exo 2", value: "Exo 2" }
              - { label: "Orbitron", value: "Orbitron" }
              - { label: "Montserrat", value: "Montserrat" }
              - { label: "Raleway", value: "Raleway" }
              - { label: "Playfair Display", value: "Playfair Display" }
              - { label: "Cormorant Garamond", value: "Cormorant Garamond" }

  - name: "cases"
    label: "🔧 Cases / Our Work"
    folder: "_data/cases"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{car}}"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
        hint: "Example: ECU Clone — BMW E60 525d"
      - label: "Car (Make, Model, Year)"
        name: "car"
        widget: "string"
        hint: "Example: BMW E60 525d 2006"
      - label: "Service Type"
        name: "service"
        widget: "select"
        options:
          - "ECU / TCU Cloning"
          - "IMMO / Key Systems"
          - "EEPROM / Flash"
          - "Module Repair"
          - "Autoservice Equipment"
          - "Other"
      - label: "Description"
        name: "description"
        widget: "markdown"
        hint: "Describe the problem and solution. Use headings, lists, bold text. This helps with SEO."
      - label: "Tags (keywords)"
        name: "tags"
        widget: "list"
        hint: "Example: ECU, BMW, cloning, KTAG"
      - label: "Photo"
        name: "image"
        widget: "image"
        required: false
      - label: "Photo Alt Text (SEO)"
        name: "image_alt"
        widget: "string"
        required: false
        hint: "Describe what is in the photo for search engines."
      - label: "Meta Description (SEO)"
        name: "meta_description"
        widget: "text"
        required: false
        hint: "150-160 characters recommended."
      - label: "Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
      - label: "Published"
        name: "published"
        widget: "boolean"
        default: true
        hint: "Uncheck to hide this case from the site"
