<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AKEI — Message Sent</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --dark: #111111;
    --border: #2a2a2a;
    --accent: #e8a020;
    --text: #d0d0d0;
    --muted: #666;
    --white: #f0f0f0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--black);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 48px;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 4px;
    color: var(--white);
    text-decoration: none;
    margin-bottom: 64px;
  }
  .logo span { color: var(--accent); }
  .icon {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--accent);
    margin-bottom: 24px;
  }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 8vw, 96px);
    color: var(--white);
    line-height: 0.95;
    margin-bottom: 24px;
  }
  h1 em { font-style: normal; color: var(--accent); }
  p {
    font-size: 16px;
    color: var(--muted);
    line-height: 1.7;
    max-width: 440px;
    margin-bottom: 48px;
  }
  a {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--black);
    background: var(--accent);
    padding: 16px 36px;
    text-decoration: none;
    transition: background 0.2s;
  }
  a:hover { background: #d4911c; }
</style>
</head>
<body>
  <a href="/" class="logo">AK<span>E</span>I</a>
  <div class="icon">// TRANSMISSION RECEIVED</div>
  <h1>MESSAGE<br><em>SENT.</em></h1>
  <p>We've received your request and will get back to you shortly. Typical response time is within 24 hours.</p>
  <a href="/">← Back to Site</a>
</body>
</html>
